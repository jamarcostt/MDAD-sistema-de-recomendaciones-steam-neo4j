# ── neo4j.conf ──────────────────────────────────────────────────────────────
# Configuración optimizada para el dataset de Steam (millones de nodos/rels)
# Esta config se monta sobre /conf/neo4j.conf dentro del contenedor.
# Las variables de memoria se sobreescriben con las del docker-compose.yml,
# pero dejamos los valores aquí como referencia y fallback.

# ── Importación ─────────────────────────────────────────
# Buffer de lectura para LOAD CSV (1 MB)
db.import.csv.buffer_size=1048576

# Sin límite de filas por query durante la importación masiva
# (el límite real lo pones con IN TRANSACTIONS OF N ROWS en Cypher)
db.query.timeout=0

# ── Transacciones ────────────────────────────────────────
# Tiempo máximo de una transacción (0 = sin límite).
# Necesario para LOAD CSV de archivos grandes.
db.transaction.timeout=0

# Memoria máxima por transacción (heap). Sin límite aquí,
# lo controla el heap global configurado en docker-compose.
db.memory.transaction.max=0

# ── Seguridad ─────────────────────────────────────────────
# Permitir LOAD CSV desde el directorio /import del contenedor
server.directories.import=/import

# ── Rendimiento del planificador de queries ───────────────
# Caché de planes de ejecución Cypher (número de planes cacheados)
db.query.plan_cache_size=1000

# ── Logging ───────────────────────────────────────────────
# Registrar queries lentas (útil para depurar la query de recomendación)
db.logs.query.enabled=INFO
db.logs.query.threshold=2000ms
