# Neo4j
spring.neo4j.uri=${NEO4J_URI}
spring.neo4j.authentication.username=${NEO4J_USER}
spring.neo4j.authentication.password=${NEO4J_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS}

# CORS
cors.allowed-origin=${CORS_ALLOWED_ORIGIN}

# Spring
spring.application.name=matchplay
server.port=8080

logging.level.com.matchplay.api=DEBUG
logging.level.org.springframework.data.neo4j=DEBUG